name = "shortfilmsite"
compatibility_date = "2024-09-23"
main = "worker/index.ts"

[assets]
directory = "./out"
binding = "ASSETS"
not_found_handling = "404-page"

[vars]
BUNNY_LIBRARY_ID = "700551"
BUNNY_COLLECTION_ID = "98f0b8d8-336d-4ab9-9c2c-513c29815305"
# Optional: exact Bunny pull-zone host for thumbnails, e.g. vz-xxxxx.b-cdn.net
# BUNNY_CDN_HOSTNAME = "vz-xxxxx.b-cdn.net"
# Set secrets with:
#   npx wrangler secret put ADMIN_PASSWORD
#   npx wrangler secret put BUNNY_API_KEY
# Local: copy .dev.vars.example → .dev.vars
